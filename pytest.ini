[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    # === Execution Scope (TEST-TAXON-01-v1) ===
    unit: Unit tests (no external deps, container-safe)
    integration: Integration tests (needs TypeDB/ChromaDB)
    e2e: End-to-end tests (needs services + may need browser)
    browser: Browser tests (needs pytest-playwright, run locally)
    slow: Slow tests (model inference)
    api: API tests (needs REST server on :8082)
    asyncio: Async tests (needs pytest-asyncio)

    # === Domain Markers ===
    rules: Tests related to governance rules
    agents: Tests related to agent system
    sessions: Tests related to session management
    tasks: Tests related to task management
    gaps: Tests related to gap tracking
    ui: Tests related to UI components
    mcp: Tests related to MCP tools/servers
    hooks: Tests related to Claude hooks
    chroma: Tests related to ChromaDB
    typedb: Tests related to TypeDB
    typedb3: Tests requiring TypeDB 3.x driver

    # === Entity Markers ===
    rule: Tests for single rule operations
    agent: Tests for single agent operations
    session: Tests for single session operations
    task: Tests for single task operations
    proposal: Tests for governance proposals
    trust: Tests for trust scoring

    # === Action Markers ===
    create: Tests for create/insert operations
    read: Tests for read/query operations
    update: Tests for update/modify operations
    delete: Tests for delete/remove operations
    validate: Tests for validation logic
    migrate: Tests for migration operations
    sync: Tests for synchronization operations

    # === Evidence Markers ===
    intent: Test intent/purpose documentation (RD-INTENT)
    effect: Expected effect documentation

    # === Concern Markers (CRUCSS) ===
    security: Security-related tests
    performance: Performance and benchmarking tests
    reliability: Reliability and resilience tests
    usability: Usability and UX tests
    scalability: Scalability tests
    capability: Capability and feature tests

    # === Component Markers ===
    component: Component-level tests (cross-module)
    benchmark: Benchmark and metric tests
    heuristic: Heuristic analysis tests

filterwarnings =
    ignore::DeprecationWarning
