# Promtail configuration (EPIC-PERF-TELEM-V1 Phase 10)
# Tails logs/access.jsonl from the API container and pushes to Loki.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: sarvaja-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: sarvaja-api
          __path__: /var/log/sarvaja/access.jsonl

    pipeline_stages:
      # Parse the entire JSON line
      - json:
          expressions:
            ts: ts
            method: method
            path: path
            status: status
            ms: ms
            rid: rid
            slow: slow
            bytes: bytes

      # Extract method, status, slow as Loki labels for filtering
      - labels:
          method:
          status:
          slow:

      # Use the ts field as the log timestamp
      - timestamp:
          source: ts
          format: "2006-01-02T15:04:05"
