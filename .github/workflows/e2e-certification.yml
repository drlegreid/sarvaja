# E2E Certification Workflow
# Per RULE-020: LLM-Driven E2E Test Generation
# Per P9.8: Capability Journey Certification

name: E2E Certification

on:
  push:
    branches: [master, main]
    paths:
      - 'agent/**'
      - 'governance/**'
      - 'tests/**'
      - '.github/workflows/e2e-certification.yml'
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - e2e

env:
  PYTHON_VERSION: '3.12'
  TYPEDB_PORT: 1729
  CHROMADB_PORT: 8001
  LITELLM_PORT: 4000
  AGENT_PORT: 7777
  GOVERNANCE_PORT: 8081

jobs:
  # ==========================================================================
  # JOB 1: Unit Tests
  # ==========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/e2e \
            --ignore=tests/integration \
            -m "unit or not (integration or e2e)" \
            --tb=short \
            --junitxml=results/unit-tests.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: results/unit-tests.xml

  # ==========================================================================
  # JOB 2: Integration Tests (requires services)
  # ==========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      typedb:
        image: vaticle/typedb:2.29.0
        ports:
          - 1729:1729
        options: >-
          --health-cmd "echo healthcheck"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      chromadb:
        image: chromadb/chroma:latest
        ports:
          - 8001:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Wait for services
        run: |
          echo "Waiting for TypeDB..."
          timeout 60 bash -c 'until nc -z localhost 1729; do sleep 2; done'
          echo "Waiting for ChromaDB..."
          timeout 60 bash -c 'until curl -s http://localhost:8001/api/v1/heartbeat; do sleep 2; done'
          echo "Services ready!"

      - name: Initialize TypeDB schema
        run: |
          python -c "
          from governance.client import TypeDBClient
          client = TypeDBClient()
          client.connect()
          print('TypeDB connected successfully')
          "

      - name: Run integration tests
        env:
          TYPEDB_HOST: localhost
          TYPEDB_PORT: 1729
          CHROMADB_HOST: localhost
          CHROMADB_PORT: 8001
        run: |
          python -m pytest tests/ -v \
            -m "integration" \
            --tb=short \
            --junitxml=results/integration-tests.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: results/integration-tests.xml

  # ==========================================================================
  # JOB 3: E2E Capability Journey Tests
  # ==========================================================================
  e2e-certification:
    name: E2E Certification
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push' || github.event.inputs.test_suite == 'e2e' || github.event.inputs.test_suite == 'all'

    services:
      typedb:
        image: vaticle/typedb:2.29.0
        ports:
          - 1729:1729

      chromadb:
        image: chromadb/chroma:latest
        ports:
          - 8001:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install robotframework robotframework-browser

      - name: Install Playwright browsers
        run: rfbrowser init chromium

      - name: Start Agent Server
        run: |
          cd agent && python playground.py &
          sleep 10
          curl -f http://localhost:7777/health || echo "Agent server starting..."

      - name: Start Governance Dashboard
        run: |
          python -m governance.mcp_server &
          sleep 5

      - name: Run Capability Journey Tests
        run: |
          robot \
            --outputdir results/e2e \
            --loglevel DEBUG \
            --variable HEADLESS:true \
            tests/e2e/capability_journey.robot || true

      - name: Upload E2E evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-certification-evidence
          path: |
            results/e2e/

      - name: Generate certification report
        if: always()
        run: |
          echo "## E2E Certification Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/e2e/JOURNEY_CERTIFICATION.txt ]; then
            cat results/e2e/JOURNEY_CERTIFICATION.txt >> $GITHUB_STEP_SUMMARY
          fi

  # ==========================================================================
  # JOB 4: Phase 7 Migration Tests
  # ==========================================================================
  phase7-tests:
    name: Phase 7 (TypeDB-First) Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run Phase 7 tests
        run: |
          python -m pytest \
            tests/test_data_router.py \
            tests/test_chroma_migration.py \
            tests/test_chroma_readonly.py \
            -v --tb=short \
            --junitxml=results/phase7-tests.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase7-test-results
          path: results/phase7-tests.xml

  # ==========================================================================
  # JOB 5: Certification Summary
  # ==========================================================================
  certification-summary:
    name: Certification Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, phase7-tests]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary
        run: |
          echo "# Sim.ai Certification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Phase 7 Tests | ${{ needs.phase7-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Per RULE-020: LLM-Driven E2E Test Generation*" >> $GITHUB_STEP_SUMMARY
          echo "*Per RULE-004: Exploratory Testing with Evidence Capture*" >> $GITHUB_STEP_SUMMARY
