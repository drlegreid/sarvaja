# Sim.ai LXC Container Configuration for Proxmox
# Deploy with: pct create <vmid> <template> --config lxc-config.conf
#
# Requirements:
# - Proxmox VE 7.x or 8.x
# - Ubuntu 22.04 or Debian 12 LXC template
# - At least 8GB RAM, 4 CPU cores, 50GB storage
#
# Created: 2024-12-24

# Basic container settings
arch: amd64
cores: 4
memory: 8192
swap: 2048
hostname: sim-ai
ostype: ubuntu
unprivileged: 0

# Network configuration (bridge mode)
net0: name=eth0,bridge=vmbr0,firewall=1,ip=dhcp,type=veth

# Storage - adjust path to your Proxmox storage
rootfs: local-lvm:50

# Required for Docker-in-LXC
features: nesting=1,keyctl=1

# Mount points for persistent data (optional - adjust paths)
# mp0: /mnt/pve/data/sim-ai/chromadb,mp=/app/data/chromadb
# mp1: /mnt/pve/data/sim-ai/ollama,mp=/root/.ollama

# Security settings for Docker
lxc.apparmor.profile: unconfined
lxc.cgroup2.devices.allow: a
lxc.cap.drop:
lxc.mount.auto: proc:rw sys:rw

# Resource limits
lxc.cgroup2.memory.max: 8589934592
lxc.cgroup2.cpu.max: 400000 100000
