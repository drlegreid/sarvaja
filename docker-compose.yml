# Unified PoC: Agno + LiteLLM + Ollama + ChromaDB + TypeDB + Governance UI
# For i7/16GB laptop with CPU-only inference
# Opik REMOVED: 2024-12-24 (DECISION-001) - overkill for current needs
#
# Profiles:
#   cpu  - Production: LiteLLM, Ollama, ChromaDB, TypeDB, Agents, Governance Dashboard
#   full - All services including Agent UI
#   dev  - Development: ChromaDB, TypeDB, Governance Dashboard (with volume mounts)
#
# Run:
#   docker compose --profile cpu up -d           # Production stack
#   docker compose --profile dev up -d           # Dev mode with live reload
#   docker compose --profile dev up --build -d   # Rebuild and run dev

services:
  # =============================================================================
  # INFERENCE LAYER
  # =============================================================================
  
  # LiteLLM Proxy - Routes requests to Claude (remote) or Ollama (local)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["cpu", "full", "dev"]
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY:-}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      # LiteLLM /health endpoint - use /health/liveliness for auth-free check
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # Ollama - Local CPU inference (gemma3:4b for lightweight tasks)
  ollama:
    image: ollama/ollama:latest
    profiles: ["cpu", "full"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =============================================================================
  # STORAGE LAYER
  # =============================================================================
  
  # ChromaDB - Vector database for rules/memories embeddings
  chromadb:
    image: chromadb/chroma:latest
    profiles: ["cpu", "full", "dev"]
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER=X-Chroma-Token
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-chroma-token-dev}
      - GOVERNANCE_API_URL=http://host.docker.internal:8082
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      # ChromaDB v2 API uses /api/v2/heartbeat (not v1)
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # TypeDB - Graph database with inference engine (DECISION-003: 2024-12-24)
  # Provides: rule inference, type safety, knowledge reasoning
  # Architecture: Hybrid with ChromaDB (semantic search + inference)
  typedb:
    image: vaticle/typedb:latest
    profiles: ["cpu", "full", "dev"]
    ports:
      - "1729:1729"
    volumes:
      - typedb_data:/opt/typedb-all-linux-x86_64/server/data
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/1729 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================================
  # AGENT LAYER
  # =============================================================================
  
  # Agno Agents - Multi-agent orchestration
  agents:
    build:
      context: ./agent
      dockerfile: Dockerfile
    profiles: ["cpu", "full", "dev"]
    ports:
      - "7777:7777"
    environment:
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      # Opik removed (DECISION-001) - will build custom session/memory UI
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-chroma-token-dev}
      - GOVERNANCE_API_URL=http://host.docker.internal:8082
      - MODEL_NAME=${MODEL_NAME:-claude-sonnet-4-20250514}
      - LOCAL_MODEL_NAME=${LOCAL_MODEL_NAME:-gemma3:4b}
    depends_on:
      - litellm
      - chromadb
    volumes:
      - ./agents.yaml:/agents.yaml
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 1G

  # Agent UI - Web interface (DISABLED: image agnohq/agent-ui doesn't exist)
  # See GAP-008: Need to find or build alternative agent UI
  # agent-ui:
  #   image: agnohq/agent-ui:latest
  #   profiles: ["full"]
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:7777
  #   depends_on:
  #     - agents

  # =============================================================================
  # GOVERNANCE UI LAYER
  # =============================================================================

  # Governance Dashboard - Trame UI for rules/decisions/sessions
  # Production mode only - not included in dev/cpu profiles
  governance-dashboard:
    build:
      context: .
      dockerfile: agent/Dockerfile.dashboard
    profiles: ["prod", "full"]
    ports:
      - "8081:8081"
    environment:
      - DASHBOARD_PORT=8081
      - TYPEDB_HOST=typedb
      - TYPEDB_PORT=1729
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-chroma-token-dev}
      - GOVERNANCE_API_URL=http://host.docker.internal:8082
    depends_on:
      - typedb
      - chromadb
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Governance Dashboard - Dev mode with live code reload
  # Disabled: Not needed in persistent dev mode, use "dashboard-dev" profile explicitly
  # governance-dashboard-dev:
  #   build:
  #     context: .
  #     dockerfile: agent/Dockerfile.dashboard
  #   profiles: ["dashboard-dev"]
  #   ports:
  #     - "8081:8081"
  #     - "8082:8082"
  #   environment:
  #     - DASHBOARD_PORT=8081
  #     - API_PORT=8082
  #     - TYPEDB_HOST=typedb
  #     - TYPEDB_PORT=1729
  #   depends_on:
  #     - typedb
  #     - chromadb

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  ollama_data:
  chromadb_data:
  typedb_data:

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  default:
    name: sim-ai-network
