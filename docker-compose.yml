# Unified PoC: Agno + LiteLLM + Ollama + ChromaDB + TypeDB + Governance UI
# For i7/16GB laptop with CPU-only inference
# Opik REMOVED: 2024-12-24 (DECISION-001) - overkill for current needs
#
# Profiles:
#   dev  - All services + test runner + volume mounts for live reload
#
# Run:
#   podman compose --profile dev up -d                    # Start all services
#   podman compose --profile dev run --rm test-runner \
#       python3 -m pytest tests/ -v                       # Run tests in container

services:
  # =============================================================================
  # INFERENCE LAYER
  # =============================================================================
  
  # LiteLLM Proxy - Routes requests to Claude (remote) or Ollama (local)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY:-}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      # LiteLLM /health endpoint - use python (curl not available in image)
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # Ollama - Local CPU inference (gemma3:4b for lightweight tasks)
  ollama:
    image: docker.io/ollama/ollama:latest
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - /home/oderid/Documents/Docker/ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    healthcheck:
      # Ollama health - use bash /dev/tcp (curl not available in image)
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =============================================================================
  # STORAGE LAYER
  # =============================================================================
  
  # ChromaDB - Vector database for rules/memories embeddings
  chromadb:
    image: docker.io/chromadb/chroma:latest
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      # FIXED: ChromaDB persist_path is /data not /chroma/chroma (GAP-PERSIST-002)
      - /home/oderid/Documents/Docker/chromadb_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER=X-Chroma-Token
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-chroma-token-dev}
      - GOVERNANCE_API_URL=http://host.docker.internal:8082
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      # ChromaDB health - use bash /dev/tcp (curl not available in image)
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # TypeDB - Graph database with inference engine (DECISION-003: 2024-12-24)
  # Provides: rule inference, type safety, knowledge reasoning
  # Architecture: Hybrid with ChromaDB (semantic search + inference)
  # UPGRADED: 3.0.8 per GAP-TYPEDB-UPGRADE-001 (2026-01-17)
  typedb:
    image: docker.io/typedb/typedb:3.7.3
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "1729:1729"
    volumes:
      # TypeDB 3.7.x data path per official release notes (3.7.1)
      - /home/oderid/Documents/Docker/typedb_data:/var/lib/typedb/data
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      # TypeDB health - use bash explicitly (/dev/tcp is bash-only, not sh)
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1729' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================================
  # AGENT LAYER
  # =============================================================================
  
  # Agno Agents - Multi-agent orchestration
  agents:
    build:
      context: ./agent
      dockerfile: Dockerfile
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "7777:7777"
    environment:
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      # Opik removed (DECISION-001) - will build custom session/memory UI
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-chroma-token-dev}
      - GOVERNANCE_API_URL=http://host.docker.internal:8082
      - MODEL_NAME=${MODEL_NAME:-claude-sonnet-4-20250514}
      - LOCAL_MODEL_NAME=${LOCAL_MODEL_NAME:-gemma3:4b}
    depends_on:
      - litellm
      - chromadb
    volumes:
      - ./agents.yaml:/agents.yaml
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 1G

  # Governance Dashboard + API - Dev mode with live code reload
  # Per TOOL-006: API containerized with volume mounts for live reload
  governance-dashboard-dev:
    build:
      context: .
      dockerfile: agent/Dockerfile.dashboard
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "8082:8082"
    environment:
      - DASHBOARD_PORT=8081
      - API_PORT=8082
      - TYPEDB_HOST=typedb
      - TYPEDB_PORT=1729
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-chroma-token-dev}
      - GOVERNANCE_API_URL=http://localhost:8082
      - CLAUDE_PROJECT_LOG_DIR=/app/claude-logs  # SESSION-METRICS-01-v1: Claude Code JSONL logs
      - SIBLING_SCAN_DIR=/app/project-siblings   # GAP-GAMEDEV-WS: Sibling project discovery
      - SIBLING_HOST_DIR=/home/oderid/Documents/Vibe/sarvaja  # GAP-GAMEDEV-WS: Host path mapping
    volumes:
      - ./agent:/app/agent:rw       # Task 0.2: rw for uvicorn --reload
      - ./governance:/app/governance:rw  # Task 0.2: rw for uvicorn --reload
      - ./shared:/app/shared:ro     # EPIC-DRY-001: shared constants
      - ./docs:/app/docs:ro
      - ./evidence:/app/evidence:rw
      - ./data:/app/data:rw         # GAP-AUDIT-EMPTY-001: Persist audit trail
      - ./.claude:/app/.claude:ro   # GAP-UI-EXP-011: Mount hooks/checkers
      - ./tests:/app/tests:ro       # WORKFLOW-SHELL-01-v1: Enable pytest in container
      - ./CLAUDE.md:/app/CLAUDE.md:ro   # RECOVER-AMNES-01-v1
      - ./TODO.md:/app/TODO.md:ro       # RECOVER-AMNES-01-v1
      - ${HOME}/.claude/projects/-home-oderid-Documents-Vibe-sarvaja-platform:/app/claude-logs:ro
      - /home/oderid/Documents/Vibe/sarvaja:/app/project-siblings:ro  # GAP-GAMEDEV-WS: Sibling project discovery
      - /tmp/podman-api.sock:/run/podman/podman.sock:ro  # EPIC-7.1: Container logs via podman API
      - /home/oderid/Documents/Docker/chroma_onnx_cache:/root/.cache/chroma:rw  # Cache ONNX embedding model across rebuilds
    depends_on:
      - typedb
      - chromadb
    healthcheck:
      # GAP-UI-038: Verify both HTTP and evidence directory access
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/ && test -d /app/evidence"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =============================================================================
  # TEST LAYER
  # =============================================================================

  # Test Runner - Containerized pytest with container networking
  # Per GAP-TEST-PROFILES: Full containerization option
  # Usage: podman compose --profile dev run --rm test-runner python3 -m pytest tests/ -v
  test-runner:
    build:
      context: .
      dockerfile: agent/Dockerfile.dashboard
    profiles: ["dev"]
    entrypoint: []  # Override dashboard entrypoint
    environment:
      # Container networking - use service names
      - TYPEDB_HOST=typedb
      - TYPEDB_PORT=1729
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - API_HOST=governance-dashboard-dev
      - API_PORT=8082
      - DASHBOARD_HOST=governance-dashboard-dev
      - DASHBOARD_PORT=8081
      - LITELLM_HOST=litellm
      - LITELLM_PORT=4000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-chroma-token-dev}
      - PYTHONPATH=/app
    volumes:
      # Mount local dev assets for live test updates
      - ./agent:/app/agent:ro
      - ./governance:/app/governance:ro
      - ./tests:/app/tests:ro
      - ./shared:/app/shared:ro
      - ./docs:/app/docs:ro
      - ./evidence:/app/evidence:rw
      - ./results:/app/results:rw
      - ./.claude:/app/.claude:ro
    depends_on:
      - typedb
      - chromadb
    working_dir: /app
    # Default command - override: podman compose run test-runner pytest tests/unit -v
    command: ["python3", "-m", "pytest", "tests/", "-v", "--tb=short", "-m", "not browser"]

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  ollama_data:
  chromadb_data:
  typedb_data:

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  default:
    name: sim-ai-network
