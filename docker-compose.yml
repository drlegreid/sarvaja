# Unified PoC: Agno + LiteLLM + Ollama + ChromaDB + TypeDB + Governance UI
# For i7/16GB laptop with CPU-only inference
# Opik REMOVED: 2024-12-24 (DECISION-001) - overkill for current needs
#
# Profiles:
#   dev  - All services + test runner + volume mounts for live reload
#
# Run:
#   podman compose --profile dev up -d                    # Start all services
#   podman compose --profile dev run --rm test-runner \
#       python3 -m pytest tests/ -v                       # Run tests in container

services:
  # =============================================================================
  # INFERENCE LAYER
  # =============================================================================
  
  # LiteLLM Proxy - Routes requests to Claude (remote) or Ollama (local)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY:-}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      # LiteLLM /health endpoint - use python (curl not available in image)
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # Ollama - Local CPU inference (gemma3:4b for lightweight tasks)
  ollama:
    image: docker.io/ollama/ollama:latest
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - /home/oderid/Documents/Docker/ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    healthcheck:
      # Ollama health - use bash /dev/tcp (curl not available in image)
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =============================================================================
  # STORAGE LAYER
  # =============================================================================
  
  # ChromaDB - Vector database for rules/memories embeddings
  chromadb:
    image: docker.io/chromadb/chroma:latest
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      # FIXED: ChromaDB persist_path is /data not /chroma/chroma (GAP-PERSIST-002)
      - /home/oderid/Documents/Docker/chromadb_data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER=X-Chroma-Token
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-chroma-token-dev}
      - GOVERNANCE_API_URL=http://host.docker.internal:8082
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      # ChromaDB health - use bash /dev/tcp (curl not available in image)
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # TypeDB - Graph database with inference engine (DECISION-003: 2024-12-24)
  # Provides: rule inference, type safety, knowledge reasoning
  # Architecture: Hybrid with ChromaDB (semantic search + inference)
  # UPGRADED: 3.0.8 per GAP-TYPEDB-UPGRADE-001 (2026-01-17)
  typedb:
    image: docker.io/typedb/typedb:3.7.3
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "1729:1729"
    volumes:
      # TypeDB 3.7.x data path per official release notes (3.7.1)
      - /home/oderid/Documents/Docker/typedb_data:/var/lib/typedb/data
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      # TypeDB health - use bash explicitly (/dev/tcp is bash-only, not sh)
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1729' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================================
  # AGENT LAYER
  # =============================================================================
  
  # Agno Agents - Multi-agent orchestration
  agents:
    build:
      context: ./agent
      dockerfile: Dockerfile
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "7777:7777"
    environment:
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      # Opik removed (DECISION-001) - will build custom session/memory UI
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-chroma-token-dev}
      - GOVERNANCE_API_URL=http://host.docker.internal:8082
      - MODEL_NAME=${MODEL_NAME:-claude-sonnet-4-20250514}
      - LOCAL_MODEL_NAME=${LOCAL_MODEL_NAME:-gemma3:4b}
    depends_on:
      - litellm
      - chromadb
    volumes:
      - ./agents.yaml:/agents.yaml
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 1G

  # Governance Dashboard + API - Dev mode with live code reload
  # Per TOOL-006: API containerized with volume mounts for live reload
  governance-dashboard-dev:
    build:
      context: .
      dockerfile: agent/Dockerfile.dashboard
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "8082:8082"
    environment:
      - DASHBOARD_PORT=8081
      - API_PORT=8082
      - TYPEDB_HOST=typedb
      - TYPEDB_PORT=1729
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-chroma-token-dev}
      - GOVERNANCE_API_URL=http://localhost:8082
      - CLAUDE_PROJECT_LOG_DIR=/app/home-claude/projects/-home-oderid-Documents-Vibe-sarvaja-platform  # SESSION-METRICS-01-v1
      - SIBLING_SCAN_DIR=/app/project-siblings   # GAP-GAMEDEV-WS: Sibling project discovery
      - SIBLING_HOST_DIR=/home/oderid/Documents/Vibe/sarvaja  # GAP-GAMEDEV-WS: Host path mapping
    volumes:
      # PROJECT ROOT — single mount replaces 10+ individual mounts
      # Local dev only: function over security (DELIVER-VERIFY-01-v1)
      # Evidence, screenshots, logs, plans — all accessible without mount changes
      - .:/app:rw
      # HOME .claude — plans, session logs, project configs
      - ${HOME}/.claude:/app/home-claude:ro
      # Sibling projects for workspace discovery
      - /home/oderid/Documents/Vibe/sarvaja:/app/project-siblings:ro
      # Podman API for container management
      - /tmp/podman-api.sock:/run/podman/podman.sock:ro
      # ONNX embedding cache
      - /home/oderid/Documents/Docker/chroma_onnx_cache:/root/.cache/chroma:rw
    depends_on:
      - typedb
      - chromadb
    healthcheck:
      # GAP-UI-038: Verify both HTTP and evidence directory access
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/ && test -d /app/evidence"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =============================================================================
  # OBSERVABILITY LAYER (EPIC-PERF-TELEM-V1)
  # =============================================================================

  # Grafana - Dashboards and visualization (Phase 11)
  grafana:
    image: docker.io/grafana/grafana:latest
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - /home/oderid/Documents/Docker/grafana_data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/api-performance.json
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Loki - Log aggregation engine (Phase 10)
  loki:
    image: docker.io/grafana/loki:latest
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki.yml:/etc/loki/local-config.yaml:ro
      - /home/oderid/Documents/Docker/loki_data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Promtail - Log shipper, tails access.jsonl and pushes to Loki (Phase 10)
  promtail:
    image: docker.io/grafana/promtail:latest
    profiles: ["dev"]
    restart: unless-stopped
    volumes:
      - ./config/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/sarvaja:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # Prometheus - Metrics collection and storage (Phase 9)
  prometheus:
    image: docker.io/prom/prometheus:latest
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /home/oderid/Documents/Docker/prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =============================================================================
  # TEST LAYER
  # =============================================================================

  # Test Runner - Containerized pytest with container networking
  # Per GAP-TEST-PROFILES: Full containerization option
  # Usage: podman compose --profile dev run --rm test-runner python3 -m pytest tests/ -v
  test-runner:
    build:
      context: .
      dockerfile: agent/Dockerfile.dashboard
    profiles: ["dev"]
    entrypoint: []  # Override dashboard entrypoint
    environment:
      # Container networking - use service names
      - TYPEDB_HOST=typedb
      - TYPEDB_PORT=1729
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - API_HOST=governance-dashboard-dev
      - API_PORT=8082
      - DASHBOARD_HOST=governance-dashboard-dev
      - DASHBOARD_PORT=8081
      - LITELLM_HOST=litellm
      - LITELLM_PORT=4000
      - CHROMA_AUTH_TOKEN=${CHROMA_AUTH_TOKEN:-chroma-token-dev}
      - PYTHONPATH=/app
    volumes:
      # Mount local dev assets for live test updates
      - ./agent:/app/agent:ro
      - ./governance:/app/governance:ro
      - ./tests:/app/tests:ro
      - ./shared:/app/shared:ro
      - ./docs:/app/docs:ro
      - ./evidence:/app/evidence:rw
      - ./results:/app/results:rw
      - ./.claude:/app/.claude:ro
    depends_on:
      - typedb
      - chromadb
    working_dir: /app
    # Default command - override: podman compose run test-runner pytest tests/unit -v
    command: ["python3", "-m", "pytest", "tests/", "-v", "--tb=short", "-m", "not browser"]

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  ollama_data:
  chromadb_data:
  typedb_data:

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  default:
    name: sim-ai-network
